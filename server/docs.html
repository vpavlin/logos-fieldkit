<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logos Field Node — Guide</title>
<style>
 :root{--bg:#0a0a0b;--panel:#101012;--ink:#f2f2f3;--muted:#8a8a90;--line:#222226;--accent2:#9a8cff}
 *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
 .wrap{max-width:820px;margin:0 auto;padding:0 20px 80px}
 header{padding:26px 0 16px;border-bottom:1px solid var(--line);margin-bottom:18px;display:flex;align-items:center;gap:14px}
 .mark{width:30px;height:30px;border-radius:50%;border:2px solid var(--ink);display:grid;place-items:center;flex:0 0 auto}
 .mark::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--accent2)}
 header h1{font-size:19px;letter-spacing:5px;margin:0;font-weight:700}
 header a{margin-left:auto;color:var(--accent2);text-decoration:none;font-size:14px}
 h1{font-size:26px} h2{font-size:23px;margin:34px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px} h3{font-size:18px;margin:22px 0 6px}
 a{color:var(--accent2)}
 code{background:#000;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.9em}
 pre{background:#000;border:1px solid var(--line);border-radius:10px;padding:14px;overflow-x:auto} pre code{border:0;padding:0;background:none;font-size:13px}
 table{border-collapse:collapse;width:100%;margin:12px 0} th,td{border:1px solid var(--line);padding:7px 10px;text-align:left;font-size:14px;vertical-align:top} th{background:var(--panel)}
 blockquote{border-left:3px solid var(--accent2);margin:12px 0;padding:4px 14px;color:var(--muted)}
 ul{padding-left:22px} li{margin:4px 0} hr{border:0;border-top:1px solid var(--line);margin:26px 0}
 .muted{color:var(--muted)} .dl{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);color:var(--muted);font-size:14px}
</style></head><body><div class="wrap">
<header><span class="mark"></span><h1>LOGOS</h1><a href="/">← field node</a></header>
<div id="doc"><p class="muted">Loading guide…</p></div>
<p class="dl">Prefer plain text or want it offline? <a href="/docs/GUIDE.md" download>Download GUIDE.md</a> — readable on any device.</p>
</div>
<script>
const esc=s=>s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function inline(s){return esc(s)
  .replace(/`([^`]+)`/g,'<code>$1</code>')
  .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
  .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');}
function isTableSep(s){return s!==undefined && /^\s*\|?[\s:|-]+\|?\s*$/.test(s) && s.includes('-');}
function render(md){
  const L=md.replace(/\r/g,'').split('\n'); const out=[]; let i=0;
  while(i<L.length){
    const l=L[i];
    if(l.startsWith('```')){const c=[];i++;while(i<L.length&&!L[i].startsWith('```')){c.push(esc(L[i]));i++;}i++;out.push('<pre><code>'+c.join('\n')+'</code></pre>');continue;}
    const h=l.match(/^(#{1,6})\s+(.*)/); if(h){out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>');i++;continue;}
    if(/^---+$/.test(l.trim())){out.push('<hr>');i++;continue;}
    if(l.startsWith('>')){const q=[];while(i<L.length&&L[i].startsWith('>')){q.push(inline(L[i].replace(/^>\s?/,'')));i++;}out.push('<blockquote>'+q.join('<br>')+'</blockquote>');continue;}
    if(l.includes('|')&&isTableSep(L[i+1])){
      const row=s=>s.replace(/^\s*\||\|\s*$/g,'').split('|').map(c=>c.trim());
      const head=row(l); i+=2; const body=[];
      while(i<L.length&&L[i].includes('|')){body.push(row(L[i]));i++;}
      out.push('<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+body.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');continue;
    }
    if(/^[-*]\s+/.test(l)){const it=[];while(i<L.length&&/^[-*]\s+/.test(L[i])){it.push('<li>'+inline(L[i].replace(/^[-*]\s+/,''))+'</li>');i++;}out.push('<ul>'+it.join('')+'</ul>');continue;}
    if(l.trim()===''){i++;continue;}
    const p=[]; while(i<L.length&&L[i].trim()!==''&&!/^(#{1,6}\s|```|>|[-*]\s)/.test(L[i])&&!/^---+$/.test(L[i].trim())&&!(L[i].includes('|')&&isTableSep(L[i+1]))){p.push(inline(L[i]));i++;}
    out.push('<p>'+p.join(' ')+'</p>');
  }
  return out.join('\n');
}
fetch('/docs/GUIDE.md?_='+Date.now()).then(r=>r.text()).then(t=>{document.getElementById('doc').innerHTML=render(t);})
  .catch(()=>{document.getElementById('doc').innerHTML='<p class="muted">Could not load the guide. <a href="/docs/GUIDE.md">Download it directly.</a></p>';});
</script></body></html>
